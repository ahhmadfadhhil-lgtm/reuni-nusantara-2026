<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Validasi Tiket — Reunusa 2026</title>
    <link rel="icon" type="image/png" href="/assets/pavicon.png" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root { --ink:#1E2A20; --cream:#FAF6F0; --forest:#122F18; --muted:#D2DBD4; }
      * { box-sizing: border-box; }
      body { margin:0; font-family:'Alexandria',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; padding:24px 16px; }
      .wrap { max-width:520px; margin:0 auto; }
      h1 { font-size:22px; margin:0 0 4px; }
      .sub { color:#6b7a6f; font-size:13px; margin:0 0 20px; }
      .card { background:#fff; border-radius:18px; padding:18px; box-shadow:0 12px 32px rgba(18,47,24,.1); margin-bottom:16px; }
      #reader { width:100%; border-radius:12px; overflow:hidden; }
      .row { display:flex; gap:8px; flex-wrap:wrap; }
      .btn { flex:1; padding:12px 16px; border-radius:10px; font-weight:600; font-family:inherit; font-size:14px; border:1px solid var(--forest); cursor:pointer; }
      .btn-primary { background:var(--forest); color:var(--cream); }
      .btn-ghost { background:#fff; color:var(--forest); }
      input { width:100%; padding:12px 14px; border-radius:10px; border:1px solid var(--muted); font-family:inherit; font-size:14px; margin-bottom:8px; }
      .result { padding:18px; border-radius:14px; text-align:center; }
      .result h2 { margin:0 0 6px; font-size:20px; letter-spacing:.04em; text-transform:uppercase; }
      .result p { margin:4px 0; font-size:14px; }
      .ok    { background:#dcfce7; color:#166534; border:2px solid #16653433; }
      .bad   { background:#fee2e2; color:#991b1b; border:2px solid #991b1b33; }
      .warn  { background:#fef9c3; color:#854d0e; border:2px solid #854d0e33; }
      .kv { display:grid; grid-template-columns:120px 1fr; gap:6px 12px; text-align:left; margin-top:12px; font-size:13px; }
      .kv div:nth-child(odd) { color:#6b7a6f; }
      .kv div:nth-child(even) { font-weight:600; }
    </style>
    <script src="/env.js"></script>
  </head>
  <body>
    <div class="wrap">
      <h1>Validasi Tiket</h1>
      <p class="sub">Khusus panitia · Reunusa 2026</p>

      <div class="card">
        <div id="reader"></div>
        <div class="row" style="margin-top:12px">
          <button class="btn btn-primary" id="btnStart">Mulai Scan</button>
          <button class="btn btn-ghost" id="btnStop" disabled>Stop</button>
        </div>
      </div>

      <div class="card">
        <label style="font-size:12px;color:#6b7a6f;font-weight:600;text-transform:uppercase;letter-spacing:.08em">Atau input manual</label>
        <input id="manualCode" placeholder="RNS-XXXX" autocomplete="off" />
        <button class="btn btn-primary" id="btnManual" style="width:100%">Cek Tiket</button>
      </div>

      <div id="resultBox"></div>
      <div id="mercResult"></div>
    </div>

    <script>
      const SUPABASE_URL = (window.__ENV && window.__ENV.SUPABASE_URL) || '';
      const SUPABASE_KEY = (window.__ENV && window.__ENV.SUPABASE_ANON_KEY) || '';
      const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      const esc = (s) => String(s ?? '').replace(/[&<>"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
      const resultBox = document.getElementById('resultBox');

      function extractCode(raw) {
        const s = String(raw || '').trim();
        // Jika URL (ticket.html?code=RNS-XXXX) ambil param code
        try {
          const u = new URL(s);
          const c = u.searchParams.get('code');
          if (c) return c.trim().toUpperCase();
        } catch (_) {}
        return s.toUpperCase();
      }

      async function validateCode(rawCode) {
        const code = extractCode(rawCode);
        if (!code) return;
        resultBox.innerHTML = '<div class="card result warn"><h2>Memeriksa...</h2><p>Kode: ' + esc(code) + '</p></div>';
        const { data, error } = await sb.rpc('get_registration_by_code', { _registration_code: code });
        if (error) {
          resultBox.innerHTML = '<div class="card result bad"><h2>● Error</h2><p>' + esc(error.message) + '</p></div>';
          return;
        }
        const row = Array.isArray(data) ? data[0] : data;
        if (!row) {
          resultBox.innerHTML = '<div class="card result bad"><h2>● INVALID</h2><p>Tiket tidak ditemukan</p><p style="margin-top:6px;font-size:12px">Kode: ' + esc(code) + '</p></div>';
          return;
        }
        const status = String(row.payment_status || '').toLowerCase();
        const ok = status === 'success';
        const pending = status === 'pending';
        const cls = ok ? 'ok' : (pending ? 'warn' : 'bad');
        const label = ok ? '● VALID' : (pending ? '● BELUM BAYAR' : '● INVALID');
        resultBox.innerHTML = `
          <div class="card result ${cls}">
            <h2>${label}</h2>
            <p>${ok ? 'Tiket terverifikasi — peserta boleh masuk.' : (pending ? 'Pembayaran belum berstatus SUCCESS.' : 'Pembayaran gagal/dibatalkan.')}</p>
            <div class="kv">
              <div>Nama</div><div>${esc(row.full_name || '—')}</div>
              <div>Kode Tiket</div><div>${esc(row.registration_code || '—')}</div>
              <div>Email</div><div>${esc(row.email || '—')}</div>
              <div>Status</div><div>${esc(row.payment_status || '—')}</div>
            </div>
          </div>
        `;
        // Load merchandise orders untuk kode ini
        loadMerchandise(row.registration_code);
      }

      // Manual input
      document.getElementById('btnManual').addEventListener('click', () => {
        validateCode(document.getElementById('manualCode').value);
      });
      document.getElementById('manualCode').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') validateCode(e.target.value);
      });

      // QR scanner
      const scanner = new Html5Qrcode('reader');
      let scanning = false;
      let lastCode = ''; let lastTs = 0;

      async function onScan(decoded) {
        const now = Date.now();
        if (decoded === lastCode && now - lastTs < 2500) return;
        lastCode = decoded; lastTs = now;
        await validateCode(decoded);
      }

      document.getElementById('btnStart').addEventListener('click', async () => {
        if (scanning) return;
        try {
          await scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: { width: 240, height: 240 } }, onScan, () => {});
          scanning = true;
          document.getElementById('btnStart').disabled = true;
          document.getElementById('btnStop').disabled = false;
        } catch (e) {
          resultBox.innerHTML = '<div class="card result bad"><h2>● Kamera Gagal</h2><p>' + esc(e.message || e) + '</p></div>';
        }
      });
      document.getElementById('btnStop').addEventListener('click', async () => {
        if (!scanning) return;
        try { await scanner.stop(); await scanner.clear(); } catch (_) {}
        scanning = false;
        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;
      });

      // ---- Merchandise Orders (untuk panitia) ----
      async function loadMerchandise(regCode) {
        document.getElementById('mercResult').innerHTML = '';
        const { data, error } = await sb
          .from('merchandise_orders')
          .select('items, total_amount, payment_status, created_at')
          .eq('registration_code', regCode)
          .order('created_at', { ascending: false });
        if (error || !data || data.length === 0) {
          document.getElementById('mercResult').innerHTML = '';
          return;
        }
        const rows = data.map(order => {
          const items = Array.isArray(order.items) ? order.items : [];
          const st = String(order.payment_status || '').toLowerCase();
          const stLabel = st === 'approved' || st === 'success' ? '✓ Lunas' : '⏳ Pending';
          const stColor = (st === 'approved' || st === 'success') ? '#166534' : '#854d0e';
          return `<div style="margin-bottom:10px;padding:10px;background:#fff;border-radius:10px;border:1px solid #D2DBD4;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;font-weight:700;color:${stColor}">${stLabel}</div>
            ${items.map(it => `<div style="display:flex;justify-content:space-between;font-size:13px;color:#1E2A20;padding:3px 0;">
              <span><b>${esc(it.name)}</b> — ${esc(it.variant)} ×${it.qty}</span>
              <span>Rp ${Number(it.price * it.qty).toLocaleString('id-ID')}</span>
            </div>`).join('')}
            <div style="border-top:1px dashed #D2DBD4;margin-top:6px;padding-top:6px;display:flex;justify-content:space-between;font-weight:700;font-size:13px;">
              <span>Total</span><span>Rp ${Number(order.total_amount).toLocaleString('id-ID')}</span>
            </div>
          </div>`;
        }).join('');
        document.getElementById('mercResult').innerHTML = `
          <div class="card" style="margin-top:0;">
            <h3 style="font-size:15px;font-weight:700;color:#122f18;margin:0 0 10px;">🛍️ Merchandise Dipesan</h3>
            ${rows}
          </div>`;
      }
    </script>
  </body>
</html>
